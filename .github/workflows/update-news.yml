name: 🔄 Auto-Update News

on:
  schedule:
    - cron: '0 */2 * * *'   # كل ساعتين تلقائياً
  workflow_dispatch:          # أو يدوياً من لوحة GitHub

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install feedparser

      - name: 📰 Fetch latest news
        run: python fetch-news.py

      - name: 💾 Commit & push if news changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data.json
          git diff --staged --quiet || (
            git commit -m "🔄 تحديث تلقائي للأخبار — $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          )
